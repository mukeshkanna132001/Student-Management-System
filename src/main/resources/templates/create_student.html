<!DOCTYPE html>
<html  xmlns:th ="http://www.thymeLeaf.org">
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
 integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
  crossorigin="anonymous">
  
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  
</head>
<body th:style="|background: url('@{/images/Back.jpg}') no-repeat center center fixed; background-size: cover;|">

  <nav class="navbar navbar-expand-md bg-dark navbar-dark">
  <!-- Brand -->
  <a class="navbar-brand" href="#">Student Management System</a>

  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="collapsibleNavbar">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" th:href="@{/students}">Students List</a>
      </li>
   
    </ul>
  </div>
</nav>
 <br>
 <br> 

<div class ="container">
<div class= "row">

<div class ="col-lg-6 col-sm-6 col-md-6 container justify-content-center card "th:style="|background: url('@{/images/card1.jpeg}') no-repeat center center fixed; background-size: cover;|">
<h1 class = "text-center">Create New Student</h1>
<div class = "card-body">

<form th:action= "@{/students}" th:object= "${student}" th:method="POST">

<div  class="form-group">

<label class = "font-weight-bold">First Name </label>

<input type="text" name="firstname" th:field="*{firstname}" class="form-control" placeholder="Enter first name"/>
<p th:if="${#fields.hasErrors('firstname')}"
   th:errors="*{firstname}"
   class="text-danger">
</p>
</div>

<div class="form-group">
<label class = "font-weight-bold">Second Name</label>
<input type="text" name="secondname" th:field="*{secondname}" class="form-control" placeholder="Enter second name"/>
<p th:if="${#fields.hasErrors('secondname')}"
   th:errors="*{secondname}"
   class="text-danger">
</p>

</div>

<div class="form-group">
<label class="font-weight-bold">Email</label>
<input type="text" name="email" th:field="*{email}" class="form-control" placeholder="Enter email"/>
<p th:if="${#fields.hasErrors('email')}"
   th:errors="*{email}"
   class="text-danger">
</p>
</div>

<div class="footer-body">
<button type="submit" class="btn btn-primary">Submit
</button></div>


</form>

</div>
</div>
</div>
</div>
</body>
</html>
