<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Students Management System</title>

<link rel="stylesheet" 
href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
 integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
  crossorigin="anonymous">
  
  
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
  
 </head>
<body th:style="|background: url('@{/images/Back.jpg}') no-repeat center center fixed; background-size: cover;|">

<nav class="navbar navbar-expand-md bg-dark navbar-dark">
  <!-- Brand -->
  <a class="navbar-brand" href="#">Student Management System</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
    <span class="navbar-toggler-icon"></span>s
  </button>
  <div class="collapse navbar-collapse" id="collapsibleNavbar">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" th:href="@{/students/new}">Add Student</a>
      </li>
    </ul>
  </div>
</nav>


  <div class = "container"><br>
  <h2 class="mb-4">
    👨‍🎓 Students Records
</h2>

  <div class= "row">
  <div class= "col-lg-3 ">
  <a th:href = "@{/students/new}" class="btn btn-primary btn-sm mb-3 ">Add Students</a>
  </div>
  </div>
  <br>
  
  <div class= "mb-3">
  <form th:action="@{/students/search}" th:method="get">
    <input type="text" name="keyword" placeholder="Search Student"/>
    <button type="submit" class="btn btn-primary btn-sm mb-1">Search </button>
    <a th:href="@{/students}"class="btn btn-secondary btn-sm mb-1">Clear Search</a>
</form>
</div><br>


   <h5 class = "alert alert-info w-25 ">Total Students = <span th:text= "${count}"></span></h5><br>
  
  
  <table class="table  table-bordered ">
  <thead class =table-dark>
  <tr>
  <th>Student First Name</th>
   <th>Student Second Name</th>
   <th>Student Email</th>
   <th>Actions</th>
    </tr>
  </thead>
  
  <tbody>
  <tr th:each= "student :${students}">
  <td th:text = "${student.firstname}"></td>
   <td th:text = "${student.secondname}"></td>
    <td th:text = "${student.email}"></td>
    <td>
    <a th:href="@{/students/edit/{id}(id =${student.id})}" class= "btn btn-primary">Update</a>
    
    <a th:href="@{/students/delete/{id}(id =${student.id})}" class= "btn btn-danger"  onclick="return confirm('Are you sure you want to delete this student?')" style = "margin-left: 10px;">Delete</a>
    </td>
    </tr>
  </tbody>
  
  </table>
  
  </div>

</body>
</html>
